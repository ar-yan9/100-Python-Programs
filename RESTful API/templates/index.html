<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="text-center mb-4">☕ Cafe API</h1>
        <div class="card bg-secondary text-white p-4">
            <h2>Available Routes:</h2>
            <ul class="list-group list-group-flush mt-3">
                <li class="list-group-item bg-secondary text-white"><b>GET</b> /random - Get a random cafe</li>
                <li class="list-group-item bg-secondary text-white"><b>GET</b> /all - Get all cafes</li>
                <li class="list-group-item bg-secondary text-white"><b>GET</b> /search?loc=Location - Search by location</li>
                <li class="list-group-item bg-secondary text-white"><b>POST</b> /add - Add a new cafe</li>
                <li class="list-group-item bg-secondary text-white"><b>PATCH</b> /update-price/cafe_id - Update coffee price</li>
                <li class="list-group-item bg-secondary text-white"><b>DELETE</b> /report-closed/cafe_id - Delete a cafe</li>
            </ul>
        </div>
    </div>
</body>
</html>
